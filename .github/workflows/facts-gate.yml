name: Facts gate

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "data/**"
      - "scripts/**"
      - ".cursor/rules/**"
      - "memories/repo/**"
  push:
    branches: [master, main]
    paths:
      - "AGENTS.md"
      - "data/**"
      - "scripts/**"

jobs:
  parametric-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: node scripts/audit-parametric-drift.mjs
      - run: node scripts/audit-session-traceability.mjs
        continue-on-error: true
